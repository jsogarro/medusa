# Exchange-Specific Configuration — Kraken

[exchange]
name=kraken

# Production API endpoint
api_url=https://api.kraken.com

# WebSocket endpoint
ws_url=wss://ws.kraken.com

# API version
api_version=0

# Rate limits
rate_limit_public=1
rate_limit_private=15

# Retry configuration
max_retries=3
retry_delay=1000

# Supported order types
order_types=market,limit,stop_loss,take_profit

[fees]
# Trading fees (percentage)
maker_fee=0.0016
taker_fee=0.0026

# Withdrawal fees (per asset)
withdrawal_fees=BTC:0.0005,ETH:0.005,USD:5.0

[symbols]
# Supported trading pairs
pairs=BTC/USD,ETH/USD,XRP/USD,ADA/USD

# Minimum order sizes (per symbol)
min_order_size=BTC:0.0001,ETH:0.001,XRP:10,ADA:10

# Price precision (decimal places)
price_precision=BTC:1,ETH:2,XRP:5,ADA:5
