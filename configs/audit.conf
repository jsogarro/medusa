# Medusa Audit System Configuration
# Controls audit frequency, enabled types, tolerances, and alerting

[audit]
# Audit frequency — number of strategy ticks between audit runs
tick_frequency=100

# Time-based frequency (alternative to tick-based)
# Used if tick_frequency is 0 or if scheduleTime is called
time_frequency=0D01:00:00

# Enable/disable individual audit types
enable_order_audit=true
enable_volume_balance_audit=true
enable_fiat_balance_audit=true
enable_ledger_audit=true
enable_position_cache_audit=true

# Crypto currencies to audit (comma-separated symbols)
volume_currencies=BTC,ETH

# Fiat currencies to audit (comma-separated symbols)
fiat_currencies=USD,EUR

# Tolerances
# Volume balance: 1 satoshi (8 decimal places)
volume_balance_tolerance=0.00000001
# Fiat balance: 1 cent
fiat_balance_tolerance=0.01
# Position cache: 1 satoshi
position_cache_tolerance=0.00000001

[alerting]
# Number of consecutive failures before escalation
max_consecutive_failures=3

# Alert on warnings (not just failures)
alert_on_warning=false

# Halt trading on critical ledger failure
halt_on_ledger_failure=true
