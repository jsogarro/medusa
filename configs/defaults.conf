# Medusa Default Configuration
# This file provides system-wide defaults

[strategy]
# Sleep time between ticks (milliseconds)
tick_sleep=100

# Maximum notional size for a single order (USD)
max_notional=10000

# Risk limit as percentage of portfolio
risk_limit=0.02

# Enable/disable strategy
enabled=true

[exchange]
# Default exchange
name=kraken

# API endpoint
api_url=https://api.kraken.com

# Rate limit (requests per second)
rate_limit=10

# Timeout (milliseconds)
timeout=5000

[database]
# Historical data path
hdb_path=/data/hdb

# Real-time data path
rdb_path=/data/rdb

# Tickerplant host
tp_host=localhost

# Tickerplant port
tp_port=5010

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR
level=INFO

# Log file path
file=/var/log/medusa.log

# Enable console logging
console=true
