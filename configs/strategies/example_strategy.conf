# Example Strategy Configuration
# Overrides defaults.conf

[strategy]
# Strategy-specific tick sleep
tick_sleep=50

# Symbols to trade
symbols=AAPL,GOOG,MSFT,AMZN

# Position size per trade (shares)
position_size=100

# Stop loss percentage
stop_loss=0.01

# Take profit percentage
take_profit=0.02

# Maximum open positions
max_positions=5

# Strategy type: momentum, mean_reversion, arbitrage
strategy_type=momentum

# Lookback period (bars)
lookback=20

# Enable paper trading mode
paper_trading=true

[exchange]
# Override exchange for this strategy
name=coinbase

# API credentials (use env vars in production)
# MEDUSA_EXCHANGE_API_KEY=your_key_here
# MEDUSA_EXCHANGE_API_SECRET=your_secret_here

[risk]
# Max drawdown before strategy halt
max_drawdown=0.05

# Daily loss limit
daily_loss_limit=1000

# Enable kill switch
kill_switch=true
